spring:
  profiles:
    include:
    - route
    - whitelist
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  data:
    redis:
      timeout: 2000ms
      host: localhost
      port: 6379
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - X-User-Id
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
server:
  port: 80

logging:
  level:
    org.springframework.boot.actuate.autoconfigure.tracing: DEBUG
    brave: DEBUG
    zipkin2: DEBUG