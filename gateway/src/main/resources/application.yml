spring:
  profiles:
    include:
    - route
    - whitelist
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  zipkin:
    base-url: http://localhost:9411
    sender:
      type: web
  tracing:
    sampling:
      probability: 1.0
  data:
    redis:
      timeout: 2000ms
      host: localhost
      port: 6379

server:
  port: 80