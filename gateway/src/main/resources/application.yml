spring:
  profiles:
    include:
    - route
    - whitelist
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  data:
    redis:
      timeout: 2000ms
      host: localhost
      port: 6379

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.client: DEBUG
    org.springframework.web.reactive: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG

server:
  port: 80