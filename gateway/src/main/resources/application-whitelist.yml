# 白名单配置(不需要认证的请求)
spring:
  whitelist:
    paths:
      # CLUB (社团)
      - GET:/api/club/**
      # POST (帖子)
      - GET:/api/post/**
      # USER (用户)
      - GET:/api/user/info
      - GET:/api/user/info/{id}
      - GET:/api/users/avatar/**
      # SEARCH (搜索)
      - GET:/api/search/**
      # AUTH (认证)
      - POST:/api/auth/login
      - POST:/api/auth/register/**
      # COMMENT (评论)
      - GET:/api/comment/**
