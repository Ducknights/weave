# 白名单配置(可以不需要认证的请求)
spring:
  whitelist:
    paths:
      # CLUB (社团)
      - GET:/api/club/**
      - GET:/api/club/batch
      # POST (帖子)
      - GET:/api/post/hot
      - GET:/api/post/new
      - GET:/api/post/user/{id}
      - GET:/api/post/file/url/**
      # USER (用户)
      - GET:/api/user/info
      - GET:/api/user/info/{id}
      - GET:/api/user/info/detail/{id}
      - GET:/api/user/avatar/**
      # SEARCH (搜索)
      - GET:/api/search/**
      # AUTH (认证)
      - POST:/api/auth/login
      - POST:/api/auth/register/**
      # COMMENT (评论)
      - GET:/api/comment/**
      # CHAT (WebSocket握手)
      - GET:/socket.io/**
      - POST:/socket.io/**
