spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]': # 全局跨域配置
            allowedOrigins: "*" # 允许跨域请求的源
            allowedMethods: "*" # 允许跨域请求的方法
            allowedHeaders: "*" # 允许跨域请求的头部
      routes: # 路由配置
        - id: auth-service
          uri: lb://auth-service # 路由的目标地址
          predicates: # 断言，判断请求是否符合要求
            - Path=/api/auth/** # 请求路径匹配

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/post/**,/api/posts/**

        - id: draft-service
          uri: lb://draft-service
          predicates:
            - Path=/api/draft/**

        - id: club-service
          uri: lb://club-service
          predicates:
            - Path=/api/club/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**,/api/users/**

        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comment/**

        - id: rag-service
          uri: lb://rag-service
          predicates:
            - Path=/api/rag/**

        - id: recommend-service
          uri: lb://recommend-service
          predicates:
            - Path=/api/recommend/**

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**

        - id: chat-websocket
          uri: http://localhost:4302
          predicates:
            - Path=/socket.io/**

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**

        # Swagger/OpenAPI routes
        - id: auth-swagger
          uri: lb://auth-service
          predicates:
            - Path=/auth/swagger-ui/**,/auth/v3/api-docs/**
          filters:
            - RewritePath=/auth/(?<path>.*), /${path}

        - id: user-swagger
          uri: lb://user-service
          predicates:
            - Path=/user/swagger-ui/**,/user/v3/api-docs/**
          filters:
            - RewritePath=/user/(?<path>.*), /${path}

        - id: post-swagger
          uri: lb://post-service
          predicates:
            - Path=/post/swagger-ui/**,/post/v3/api-docs/**
          filters:
            - RewritePath=/post/(?<path>.*), /${path}

        - id: club-swagger
          uri: lb://club-service
          predicates:
            - Path=/club/swagger-ui/**,/club/v3/api-docs/**
          filters:
            - RewritePath=/club/(?<path>.*), /${path}

        - id: comment-swagger
          uri: lb://comment-service
          predicates:
            - Path=/comment/swagger-ui/**,/comment/v3/api-docs/**
          filters:
            - RewritePath=/comment/(?<path>.*), /${path}

        - id: chat-api-swagger
          uri: lb://chat-service
          predicates:
            - Path=/chat/swagger-ui/**,/chat/v3/api-docs/**
          filters:
            - RewritePath=/chat/(?<path>.*), /${path}

        - id: search-swagger
          uri: lb://search-service
          predicates:
            - Path=/search/swagger-ui/**,/search/v3/api-docs/**
          filters:
            - RewritePath=/search/(?<path>.*), /${path}

        - id: recommend-swagger
          uri: lb://recommend-service
          predicates:
            - Path=/recommend/swagger-ui/**,/recommend/v3/api-docs/**
          filters:
            - RewritePath=/recommend/(?<path>.*), /${path}

        - id: draft-swagger
          uri: lb://draft-service
          predicates:
            - Path=/draft/swagger-ui/**,/draft/v3/api-docs/**
          filters:
            - RewritePath=/draft/(?<path>.*), /${path}
