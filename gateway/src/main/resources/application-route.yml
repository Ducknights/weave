spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]': # 全局跨域配置
            allowedOrigins: "*" # 允许跨域请求的源
            allowedMethods: "*" # 允许跨域请求的方法
            allowedHeaders: "*" # 允许跨域请求的头部
      routes: # 路由配置
        - id: auth-service
          uri: lb://auth-service # 路由的目标地址
          predicates: # 断言，判断请求是否符合要求
            - Path=/api/auth/** # 请求路径匹配

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/post/**

        - id: club-service
          uri: lb://club-service
          predicates:
            - Path=/api/club/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**