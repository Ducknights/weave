server:
  port: 8082

spring:
  application:
    name: server-email
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
    # 连接失败时的容错配置
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2
    # 连接超时配置
    connection-timeout: 3000
    requested-heartbeat: 10s
  
  # 邮件配置
  mail:
    # 配置SMTP服务器地址，例如：smtp.qq.com, smtp.163.com, smtp.gmail.com
    host: smtp.qq.com
    
    # 配置端口，QQ邮箱：587，163邮箱：25，Gmail：587
    port: 587
    
    # 配置发送邮件的邮箱地址
    username: 2897662424@qq.com
    
    # 配置邮箱授权码（不是登录密码，是邮箱提供的授权码）
    password: jcsdpyshmpxsdffd
    
    # 配置邮件协议
    protocol: smtp
    
    # 默认编码
    default-encoding: UTF-8
    
    # SMTP服务器配置
    properties:
      mail:
        smtp:
          # 启用认证
          auth: true
          # 启用TLS加密
          starttls:
            enable: true
            required: true
          # 启用SSL
          ssl:
            enable: false
          # 连接超时时间（毫秒）z
          connectiontimeout: 5000
          # 读取超时时间（毫秒）
          timeout: 5000
          # 写入超时时间（毫秒）
          writetimeout: 5000
# 应用配置
app:
  # 邮件发送者名称
  email:
    from-name: 毕业设计
    # 配置默认回复邮箱
    reply-to: 2897662424@qq.com