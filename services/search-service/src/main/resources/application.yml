spring:
  application:
    name: search-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 10s
    socket-timeout: 30s

server:
  port: 4600

# 日志配置
logging:
  level:
    root: info
    org.example: debug
    org.elasticsearch: warn
