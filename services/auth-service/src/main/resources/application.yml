spring:
  application:
    name: auth-service

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    loadbalancer:
      cache:
        enabled: true
  # Feign 客户端配置
  feign:
    circuitbreaker:
      enabled: true  # 启用断路器
    client:
      config:
        default:
          connectTimeout: 5000  # 连接超时时间 (毫秒)
          readTimeout: 10000    # 读取超时时间 (毫秒)
    httpclient:
      enabled: false  # 禁用Apache HttpClient，使用URLConnection
    okhttp:
      enabled: true   # 启用OkHttp

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/graduation-design-auth
    username: root
    password: ALIEZ2436946
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 3000ms # 连接超时时间
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms # 最大阻塞等待时间
          max-idle: 8
          min-idle: 0

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    # 消息确认机制
    publisher-confirm-type: correlated # 发送确认
    publisher-returns: true # 发送返回
    template:
      mandatory: true # 消息路由失败时返回给生产者
    listener:
      simple:
        acknowledge-mode: manual # 手动确认
        retry:
          enabled: true # 开启重试
          max-attempts: 3 # 最大重试次数

server:
  port: 4000

management:
  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - X-User-Id
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: ${spring.application.name:},%X{traceId:-},%X{spanId:-}
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.boot.actuate.autoconfigure.tracing: DEBUG
    brave: DEBUG
    zipkin2: DEBUG
