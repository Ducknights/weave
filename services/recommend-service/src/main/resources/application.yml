spring:
  application:
    name: recommend-service
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  zipkin:
    base-url: http://localhost:9411
    sender:
      type: web
  tracing:
    sampling:
      probability: 1.0
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/weave-recommend?serverTimezone=UTC
    username: root
    password: ALIEZ2436946
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    # 消息确认机制
    publisher-confirm-type: correlated # 发送确认
    publisher-returns: true # 发送返回
    template:
      mandatory: true # 消息路由失败时返回给生产者
    listener:
      simple:
        acknowledge-mode: manual # 手动确认
        retry:
          enabled: true # 开启重试
          max-attempts: 3 # 最大重试次数
server:
  port: 4800

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  configuration-properties:
    map-underscore-to-camel-case: true
